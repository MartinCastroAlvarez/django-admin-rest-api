name: Publish

# Publish a tagged release to PyPI via Trusted Publishing (OIDC).
#
# Trigger: push a tag matching `v*`. The job rebuilds the sdist + wheel
# from the tagged source — never from an untagged main — and uploads
# them with a short-lived credential PyPI issues to this exact workflow
# running under the `pypi` GitHub environment. No long-lived
# `PYPI_API_TOKEN` secret is involved.
#
# Trust binding (PyPI side):
#   - Owner:      martincastroalvarez
#   - Repository: django-admin-rest-api
#   - Workflow:   publish.yml          ← this file
#   - Environment: pypi
#
# Changing any of those four needs the trust binding to be updated
# on pypi.org first, otherwise PyPI rejects the publish with
# `invalid-publisher: valid token, but no corresponding publisher`.
#
# This workflow does NOT bump versions or write to the repo; it just
# publishes whatever `pyproject.toml` has at the tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-to-pypi:
    name: Build + publish to PyPI (OIDC)
    runs-on: ubuntu-latest

    # OIDC: the runner needs to mint a JWT for PyPI. `id-token: write`
    # is the GitHub Actions permission that enables that.
    permissions:
      id-token: write

    # The Deployments tab is keyed off this environment name. The
    # `url:` makes the deployment card link to the published PyPI page.
    # The trust binding on pypi.org references this exact environment
    # name — changing it requires the PyPI side to be updated too.
    environment:
      name: pypi
      url: https://pypi.org/project/django-admin-rest-api/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Twine check
        run: python -m twine check --strict dist/*

      - name: Publish to PyPI
        # No `password:` input — the action exchanges the runner's
        # OIDC token for a short-lived PyPI credential automatically.
        # `skip-existing: true` makes re-runs idempotent (a re-run
        # on a tag whose wheel was already uploaded no-ops instead of
        # 400'ing on `File already exists`).
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
