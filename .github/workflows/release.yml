name: Release

# Publish a tagged release to PyPI through a GitHub `pypi` environment so
# every publish shows up under the repo's Deployments tab and inherits the
# environment's protection rules (approvers, allowed branches, etc.).
#
# Trigger: push a tag matching `v*` (matches the existing `v0.1.0a*` /
# `v1.0.0` / `v1.0.1` tags). The job rebuilds the sdist + wheel from the
# tagged source — never from an untagged main — and uploads them with the
# `PYPI_API_TOKEN` secret stored in the `pypi` environment.
#
# This workflow does NOT bump versions or write to the repo; it just
# publishes whatever pyproject.toml has at the tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-to-pypi:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest

    # The Deployments tab is keyed off this environment name. The
    # `url:` makes the deployment card link to the published PyPI page.
    environment:
      name: pypi
      url: https://pypi.org/project/django-admin-rest-api/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Twine check
        run: python -m twine check --strict dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          # Stored in the `pypi` GitHub environment, NOT a repo-wide secret,
          # so PR runs from forks cannot read it.
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive --skip-existing dist/*
